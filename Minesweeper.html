<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>扫雷 · 多人对战版</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="game-container">
    <!-- 顶部状态栏 -->
    <div class="status-panel">
        <div class="mine-counter" id="mineDisplay">000</div>
        <div class="face-button" id="resetButton">😊</div>
        <div class="difficulty">
            <button id="easyBtn">初级</button>
            <button id="mediumBtn">中级</button>
            <button id="hardBtn">高级</button>
        </div>
    </div>

    <!-- 模式切换面板 -->
    <div class="mode-panel">
        <button id="singleModeBtn" class="mode-btn active">🎮 单人模式</button>
        <button id="doubleModeBtn" class="mode-btn">👥 双人对战</button>
        <button id="tripleModeBtn" class="mode-btn">👥👤 三人对战</button>
    </div>

    <!-- 玩家信息面板 -->
    <div class="players-panel" id="playersPanel" style="display: none;">
        <div class="player-card player1-card" id="player1Card">
            <div class="player-name">🔴 红方玩家</div>
            <div class="player-controls">按键: <kbd>W</kbd> <kbd>A</kbd> <kbd>S</kbd> <kbd>D</kbd> 移动，<kbd>空格</kbd> 翻开</div>
            <div class="player-score" id="player1Score">得分: 0</div>
            <div class="player-turn" id="player1Turn">👑 当前回合</div>
        </div>
        <div class="player-card player2-card" id="player2Card">
            <div class="player-name">🔵 蓝方玩家</div>
            <div class="player-controls">按键: <kbd>←</kbd> <kbd>↑</kbd> <kbd>↓</kbd> <kbd>→</kbd> 移动，<kbd>空格</kbd> 翻开</div>
            <div class="player-score" id="player2Score">得分: 0</div>
            <div class="player-turn" id="player2Turn">⏳ 等待中</div>
        </div>
        <div class="player-card player3-card" id="player3Card" style="display: none;">
            <div class="player-name">🟢 绿方玩家</div>
            <div class="player-controls">操作: <kbd>鼠标点击</kbd> 翻开格子</div>
            <div class="player-score" id="player3Score">得分: 0</div>
            <div class="player-turn" id="player3Turn">⏳ 等待中</div>
        </div>
    </div>

    <!-- 游戏棋盘 -->
    <div class="board-wrapper">
        <div class="board" id="board"></div>
    </div>

    <!-- 消息提示 -->
    <div class="win-message" id="messageArea"></div>

    <!-- 游戏提示 -->
    <div class="double-tip" id="doubleTip" style="display: none;">
        💡 提示
    </div>

    <!-- 音频控制面板 -->
    <div class="audio-control-panel">
        <button id="toggleBgmBtn" class="audio-control-btn">🎵 背景音乐</button>
        <button id="toggleSfxBtn" class="audio-control-btn">🔊 音效</button>
    </div>
</div>

<!-- 音频元素 -->
<audio id="bgmAudio" loop preload="auto" style="display:none;">
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>
<audio id="clickAudio" preload="auto" style="display:none;">
    <source src="https://www.soundjay.com/misc/sounds/click-01.mp3" type="audio/mpeg">
</audio>
<audio id="explodeAudio" preload="auto" style="display:none;">
    <source src="https://www.myinstants.com/media/sounds/explosion.mp3" type="audio/mpeg">
</audio>
<audio id="winAudio" preload="auto" style="display:none;">
    <source src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3" type="audio/mpeg">
</audio>
<audio id="comboAudio" preload="auto" style="display:none;">
    <source src="https://www.soundjay.com/misc/sounds/cheering-01.mp3" type="audio/mpeg">
</audio>

<script src="game.js"></script>
</body>
</html>
